# main に release/ 配下の変更が入ったら、文言とスクショを
# App Store Connect へ自動反映する（fastlane deliver・バイナリは触らない）。
# 必要な Secrets と運用ルールは release/README.md の「自動反映（CI）」を参照。
name: App Store metadata

on:
  push:
    branches: [main]
    paths:
      - "release/**"
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 文字数チェック
        run: python3 scripts/check_release_metadata.py

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: release/ を fastlane レイアウトへ同期
        id: sync
        run: python3 scripts/sync_fastlane_metadata.py

      - name: App Store Connect へアップロード
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          ASC_CONTACT_FIRST_NAME: ${{ secrets.ASC_CONTACT_FIRST_NAME }}
          ASC_CONTACT_LAST_NAME: ${{ secrets.ASC_CONTACT_LAST_NAME }}
          ASC_CONTACT_PHONE: ${{ secrets.ASC_CONTACT_PHONE }}
          ASC_CONTACT_EMAIL: ${{ secrets.ASC_CONTACT_EMAIL }}
          APP_VERSION: ${{ steps.sync.outputs.version }}
        run: bundle exec fastlane ios push_metadata
