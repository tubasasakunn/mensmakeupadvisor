# production にマージされたら、Xcode Cloud が上げた最新ビルドを選んで
# 審査へ提出する（メタデータ反映も同時に行う）。バイナリのビルド／アップロードは
# Xcode Cloud 側。必要な Secrets は release/README.md の「自動反映（CI）」を参照。
name: App Store release

on:
  push:
    branches: [production]
  workflow_dispatch:
    inputs:
      version:
        description: "提出するバージョン（省略時は pbxproj の MARKETING_VERSION）"
        required: false

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 文字数チェック
        run: python3 scripts/check_release_metadata.py

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: release/ を fastlane レイアウトへ同期
        id: sync
        run: python3 scripts/sync_fastlane_metadata.py ${{ github.event.inputs.version }}

      - name: 最新ビルドを選んで審査へ提出
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          ASC_CONTACT_FIRST_NAME: ${{ secrets.ASC_CONTACT_FIRST_NAME }}
          ASC_CONTACT_LAST_NAME: ${{ secrets.ASC_CONTACT_LAST_NAME }}
          ASC_CONTACT_PHONE: ${{ secrets.ASC_CONTACT_PHONE }}
          ASC_CONTACT_EMAIL: ${{ secrets.ASC_CONTACT_EMAIL }}
          APP_VERSION: ${{ steps.sync.outputs.version }}
        run: bundle exec fastlane ios submit_latest_build
