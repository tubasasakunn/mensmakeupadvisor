name: Deploy

on:
  push:
    tags:
      - "v*.*.*"           # v1.2.3 形式のタグで自動実行
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane to run (beta / release)"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - release
      release_notes:
        description: "Release notes (TestFlight changelog)"
        required: false
        default: ""

jobs:
  deploy:
    name: ${{ github.event_name == 'workflow_dispatch' && inputs.lane || 'beta' }}
    runs-on: self-hosted
    timeout-minutes: 60

    env:
      # ── App Store Connect API Key ──────────────────────
      # GitHub Secrets に以下を登録してください:
      #   ASC_KEY_ID       : API Key の Key ID
      #   ASC_ISSUER_ID    : Issuer ID (UUID)
      #   ASC_KEY_CONTENT  : .p8 ファイルの中身を base64 エンコードしたもの
      #                      `base64 -i AuthKey_XXXXXX.p8 | pbcopy`
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}

      # ── Fastlane Match (証明書リポジトリ) ───────────────
      # GitHub Secrets に以下を登録してください:
      #   MATCH_GIT_URL       : 証明書用プライベートリポジトリの HTTPS URL
      #                         例: https://github.com/tubasasakunn/ios-certs.git
      #   MATCH_GIT_BASIC_AUTH: base64("github_username:github_pat")
      #                         `echo -n "tubasasakunn:ghp_xxx" | base64 | pbcopy`
      #   MATCH_PASSWORD      : Match 暗号化パスフレーズ
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BASIC_AUTH: ${{ secrets.MATCH_GIT_BASIC_AUTH }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      RELEASE_NOTES: ${{ inputs.release_notes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # build number 計算のため全履歴取得

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Determine lane
        id: lane
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.lane }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy (${{ steps.lane.outputs.name }})
        run: bundle exec fastlane ${{ steps.lane.outputs.name }}

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ github.run_number }}
          path: "*.ipa"
          retention-days: 14
          if-no-files-found: ignore
