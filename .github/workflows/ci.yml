name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build check
    # iOS 26 SDK が必要なため self-hosted Mac を推奨
    # GitHub hosted runner が Xcode 26 対応したら "macos-15" に変更可
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build (no signing)
        run: bundle exec fastlane build_check
