# =================================================================
# TestFlight 自動デプロイ
#
# トリガー: main への push（コード変更時のみ）/ 手動実行
# 動作:    archive → IPA エクスポート → TestFlight アップロード
#
# 前提（一度だけ User がやる必要があるもの）:
#  1) App Store Connect で API キー (.p8) を発行
#     https://appstoreconnect.apple.com/access/api
#     役割: App Manager 以上
#  2) GitHub Secrets を 3 つ登録
#     - ASC_KEY_ID       : Key ID (例: ABC1234567)
#     - ASC_ISSUER_ID    : Issuer ID (UUID)
#     - ASC_KEY_CONTENT  : .p8 ファイルの中身を base64 化したもの
#                         `base64 -i AuthKey_XXXXXX.p8 | pbcopy`
#  3) App Store Connect に bundle id = com.tubasasakun.mensmakeupadvisor の
#     App レコードが存在すること
#  4) Distribution 証明書 + App Store プロビジョニングプロファイル は
#     -allowProvisioningUpdates で xcodebuild が自動生成するため事前準備不要
# =================================================================

name: TestFlight Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.maestro/**'
      - 'screenshots/**'
      - '.github/**'
      - '.claude/**'
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    env:
      PROJECT: mensmakeupadvisor.xcodeproj
      SCHEME: mensmakeupadvisor
      CONFIGURATION: Release
      ARCHIVE_PATH: build/mensmakeupadvisor.xcarchive
      EXPORT_PATH: build/export

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ビルド番号 = git rev-list count に使う

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$ASC_KEY_CONTENT" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Compute build number from commit count
        id: build_number
        run: echo "value=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          BUILD_NUM: ${{ steps.build_number.outputs.value }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUM" \
            CODE_SIGN_STYLE=Automatic

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA_PATH=$(ls "$EXPORT_PATH"/*.ipa | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Cleanup API key
        if: always()
        run: rm -rf ~/.appstoreconnect

      - name: Upload IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-build-${{ steps.build_number.outputs.value }}
          path: ${{ env.EXPORT_PATH }}/*.ipa
          retention-days: 14
          if-no-files-found: ignore
