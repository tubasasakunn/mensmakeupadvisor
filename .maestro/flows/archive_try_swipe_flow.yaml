appId: com.tubasasakun.mensmakeupadvisor
---
# Archive 「今の自分で試す」→ Studio で縦スワイプして前後ルックを切り替える。
#
# 前提: コレクション(Archive)に 2 件以上の保存ルックがあること。
#   縦スワイプ切替の UI (studio_try_pager) は保存ルックが 2 件以上のときだけ出る。
#   このフローは clearState せず、既存の保存ルックを使う。
#   保存ルックが無い環境では先に studio_flow / archive_flow で 2 件保存しておくこと。

- launchApp:
    arguments:
      - "--mock-mode"
      - "--mock-image-picker"

- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    id: "onboarding_skip_button"
    optional: true

# ── コレクションを開く
- tapOn:
    id: "home_tab_archive"

- assertVisible:
    id: "home_archive_tab"

# ── 先頭の保存ルックを開いて「今の自分で試す」
- tapOn:
    id: "home_archive_card_.*"
    index: 0

- assertVisible:
    id: "home_archive_detail_sheet"

- tapOn:
    id: "home_archive_detail_try"

# ── 撮影はモック画像で代替 → 解析後そのまま Studio へ
- tapOn:
    id: "advice_sample_button"

- waitForAnimationToEnd:
    timeout: 10000

- assertVisible:
    id: "studio_view"

# ── 縦スワイプのページャーが出ている (1 / N)
- assertVisible:
    id: "studio_try_pager"

# ── 上スワイプ = 次のルックへ
- swipe:
    direction: UP
    duration: 300

- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: "studio_try_pager"

# ── 下スワイプ = 前のルックへ戻る
- swipe:
    direction: DOWN
    duration: 300

- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: "studio_try_pager"

# ── 「完了」で保存せずホームへ
- tapOn:
    id: "studio_next_button"

- assertVisible:
    id: "home_view"
