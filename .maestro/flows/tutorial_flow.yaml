appId: com.tubasasakun.mensmakeupadvisor
---
# チュートリアル画面 E2E フロー
# 前提: --mock-mode の Launch Arguments が付いていること

- launchApp:
    arguments:
      - "--mock-mode"

- waitForAnimationToEnd:
    timeout: 3000

# オンボーディングをスキップ
- tapOn:
    id: "onboarding_skip_button"
    optional: true

# サンプル画像で分析開始
- tapOn:
    id: "advice_sample_button"

- waitForAnimationToEnd:
    timeout: 10000

# チュートリアル画面の表示を確認
- assertVisible:
    id: "tutorial_view"

- assertVisible:
    id: "tutorial_step_info"

# その部位の強度スライダーを確認
- assertVisible:
    id: "tutorial_intensity_slider"

# スワイプで次の部位へ進む
- swipe:
    direction: LEFT

- waitForAnimationToEnd:
    timeout: 800

- assertVisible:
    id: "tutorial_step_info"

# スワイプで前の部位へ戻る
- swipe:
    direction: RIGHT

- waitForAnimationToEnd:
    timeout: 800

# 残りの部位は NEXT ボタンで最後まで進める (部位数は顔型で変わる)
- repeat:
    times: 20
    commands:
      - tapOn:
          id: "tutorial_next_button"
          optional: true
      - waitForAnimationToEnd:
          timeout: 600

- assertVisible:
    id: "studio_view"
