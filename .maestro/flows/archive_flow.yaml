appId: com.tubasasakun.mensmakeupadvisor
---
# Navigate to archive after saving a look

- launchApp:
    arguments:
      - "--mock-mode"

- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    id: "onboarding_skip_button"
    optional: true

- tapOn:
    id: "advice_sample_button"

- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    id: "diagnosis_skip_button"

- assertVisible:
    id: "studio_view"

- tapOn:
    id: "studio_save_button"

- assertVisible:
    id: "studio_saved_notification"

# トーストの「ホームへ」ボタンでホームに戻る
- tapOn:
    id: "studio_saved_go_home"

- assertVisible:
    id: "home_view"

# 「保存」タブを開いて保存したルックを確認
- tapOn:
    id: "home_tab_archive"

- assertVisible:
    id: "home_archive_tab"
